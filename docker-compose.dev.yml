version: '3.8'

services:
  admin-report-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=bank_admin_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - API_GATEWAY_URL=http://kong:8000
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - bank-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bank_admin_db
    ports:
      - "5434:5432"
    networks:
      - bank-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5674:5672"
      - "15674:15672"
    networks:
      - bank-network

networks:
  bank-network:
    driver: bridge

volumes:
  postgres_data:
